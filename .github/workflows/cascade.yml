# Cascades commits from main into the per-brand branches (people/equine/animals).
#
# Prerequisites (one-time repo setup):
# - Settings → Actions → General → "Allow GitHub Actions to create and approve
#   pull requests" must be ON. Without it, gh pr create fails with
#   "GitHub Actions is not permitted to create or approve pull requests".
# - Brand branches must NOT have branch protection that requires reviews or
#   passing checks — gh pr merge --merge runs as github-actions[bot] and would
#   be blocked. If protection is added later, switch to gh pr merge --auto.
# - Uses GITHUB_TOKEN (not a PAT). Side effect: PRs opened by this workflow
#   do NOT trigger downstream workflows (anti-recursion guard). Swap to a PAT
#   secret if brand-branch CI is added later.
name: Cascade main to brand branches

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cascade:
    strategy:
      fail-fast: false
      matrix:
        brand: [people, equine, animals]
    # Per-brand serialization — two near-simultaneous pushes to main queue
    # rather than racing the cascade/<sha>-<brand> branch push.
    concurrency:
      group: cascade-${{ matrix.brand }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Skip if brand is already up to date
        id: check
        run: |
          BEHIND=$(git rev-list --count origin/${{ matrix.brand }}..origin/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" = "0" ]; then
            echo "Brand ${{ matrix.brand }} already contains origin/main — nothing to cascade."
          fi

      - name: Create cascade branch
        if: steps.check.outputs.behind != '0'
        id: branch
        run: |
          SHORT_SHA=$(git rev-parse --short origin/main)
          BRANCH="cascade/${SHORT_SHA}-${{ matrix.brand }}"
          git checkout -B "$BRANCH" "origin/${{ matrix.brand }}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          if git merge --no-ff origin/main \
              -m "Cascade main → ${{ matrix.brand }} (${{ steps.branch.outputs.short_sha }})"; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            # Capture the conflicting paths before staging so we can surface
            # them in the conflict PR body (saves the resolver a step).
            {
              echo "conflicted<<CONFLICTED_EOF"
              git diff --name-only --diff-filter=U | sed 's/^/- /'
              echo "CONFLICTED_EOF"
            } >> "$GITHUB_OUTPUT"
            git add -A
            git commit -m "Cascade main → ${{ matrix.brand }} (${{ steps.branch.outputs.short_sha }}) — CONFLICTS"
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push cascade branch
        if: steps.check.outputs.behind != '0'
        run: git push origin "${{ steps.branch.outputs.branch }}"

      - name: Build cascaded-commits list
        if: steps.check.outputs.behind != '0'
        id: commits
        run: |
          {
            echo "list<<COMMITS_EOF"
            git log --pretty=format:'- %h %s' "origin/${{ matrix.brand }}..origin/main"
            echo
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR (clean) and auto-merge
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<'BODY_EOF'
          Auto-cascade from main. Clean merge — merging automatically.

          **Commits being cascaded:**
          ${{ steps.commits.outputs.list }}
          BODY_EOF
          )
          PR_URL=$(gh pr create \
            --base "${{ matrix.brand }}" \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "Cascade main → ${{ matrix.brand }} (${{ steps.branch.outputs.short_sha }})" \
            --body "$BODY")
          echo "Opened $PR_URL"
          gh pr merge "$PR_URL" --merge --delete-branch

      - name: Open PR (conflict) for manual resolution
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat <<'BODY_EOF'
          Auto-cascade from main hit merge conflicts.

          **Conflicted files:**
          ${{ steps.merge.outputs.conflicted }}

          The branch was pushed with conflict markers committed so you can see the diff. To resolve:

          ```
          git fetch origin
          git checkout ${{ steps.branch.outputs.branch }}
          git reset --hard origin/${{ matrix.brand }}
          git merge origin/main
          # resolve conflicts, then:
          git commit
          git push --force-with-lease
          ```

          Then merge this PR.
          BODY_EOF
          )
          gh pr create \
            --base "${{ matrix.brand }}" \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "⚠️ Cascade main → ${{ matrix.brand }} (${{ steps.branch.outputs.short_sha }}) — CONFLICTS" \
            --body "$BODY"
